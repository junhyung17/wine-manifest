# ============================================================
# 파일: django/deployment.yaml
# 역할: Django API 서버를 K8S Deployment로 배포
#
# Deployment = "이 컨테이너를 N개 실행하고 항상 유지해줘"라는 명령
# Pod가 죽으면 자동으로 새 Pod를 시작함
#
# 이미지: GitHub Actions가 빌드해서 ghcr.io에 올린 이미지를 사용
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wine-api-deploy
  namespace: wine
  labels:
    app: wine-api
spec:
  replicas: 2                # Django 서버 2개 실행 (하나 죽어도 서비스 유지)
  selector:
    matchLabels:
      app: wine-api
  template:
    metadata:
      labels:
        app: wine-api
    spec:
      # ghcr.io (GitHub Container Registry) 이미지를 가져오기 위한 인증
      # 아래 Secret이 없으면 이미지를 못 가져옴
      # 생성 명령: kubectl create secret docker-registry ghcr-secret \
      #   -n wine \
      #   --docker-server=ghcr.io \
      #   --docker-username=junhyung17 \
      #   --docker-password=<GitHub_Token>
      imagePullSecrets:
      - name: ghcr-secret   # GitHub Container Registry 접근 Secret

      # DB가 준비된 후 Django가 시작되도록 초기화 컨테이너 실행
      initContainers:
      - name: wait-for-db
        image: busybox:1.36
        # DB 포트가 열릴 때까지 반복 확인 (최대 60회 * 2초 = 2분 대기)
        command: ['sh', '-c',
          'until nc -z wine-db-svc 5432; do echo "DB 대기 중..."; sleep 2; done; echo "DB 준비 완료!"']

      containers:
      - name: wine-api
        # GitHub Actions가 빌드한 최신 이미지
        image: ghcr.io/junhyung17/wine-note:latest
        imagePullPolicy: Always   # 항상 최신 이미지를 가져옴

        ports:
        - containerPort: 8000     # Gunicorn이 실행되는 포트

        # ConfigMap에서 환경변수 전체 로드
        envFrom:
        - configMapRef:
            name: wine-api-config

        # Secret에서 민감한 환경변수 개별 로드
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wine-db-secret
              key: POSTGRES_PASSWORD

        # Django SECRET_KEY (보안 핵심값 - 반드시 Secret으로 관리)
        # 생성: kubectl create secret generic wine-django-secret \
        #         -n wine \
        #         --from-literal=SECRET_KEY="$(python -c 'import secrets; print(secrets.token_urlsafe(50))')"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: wine-django-secret
              key: SECRET_KEY

        # Pod 건강 상태 체크
        livenessProbe:
          httpGet:
            path: /api/health/    # Django 헬스체크 엔드포인트
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3     # 3번 실패하면 Pod 재시작

        readinessProbe:
          httpGet:
            path: /api/health/
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

        # 리소스 제한
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
