# ============================================================
# 파일: postgresql/secret.yaml
# 역할: PostgreSQL 접속 비밀번호 등 민감한 정보를 K8S Secret으로 저장
#       Secret = K8S에서 비밀번호/토큰 등을 안전하게 보관하는 방법
#
# ⚠️  GitHub에 올리기 전 반드시 비밀번호 변경!
#
# 값 생성 방법 (Master VM에서 실행):
#   echo -n "원하는유저명" | base64   → POSTGRES_USER 값
#   echo -n "원하는패스워드" | base64 → POSTGRES_PASSWORD 값
#   echo -n "원하는DB명" | base64     → POSTGRES_DB 값
#
# 현재 기본값 (반드시 변경하세요!):
#   POSTGRES_USER     = wineuser
#   POSTGRES_PASSWORD = changeme123  ← 꼭 바꾸세요!
#   POSTGRES_DB       = winedb
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: wine-db-secret       # 다른 K8S 리소스에서 이 이름으로 참조
  namespace: wine
type: Opaque                 # 일반 비밀 데이터 (TLS, SSH 키가 아닌 경우)
data:
  # base64 인코딩된 값들 (평문 아님)
  # echo -n "wineuser" | base64
  POSTGRES_USER: d2luZXVzZXI=

  # 자동 생성된 보안 패스워드 (secrets.token_urlsafe(20))
  POSTGRES_PASSWORD: OTRoblVFLWNJU1dCLU1lX1d2RDVHcUVyRjRN

  # echo -n "winedb" | base64
  POSTGRES_DB: d2luZWRi
