# ============================================================
# 파일: namespace/namespace.yaml
# 역할: wine 프로젝트 전용 K8S 네임스페이스 생성
#       네임스페이스 = 프로젝트별로 자원을 격리하는 가상 공간
#       다른 앱(stock-site 등)과 완전히 분리됨
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: wine                 # 네임스페이스 이름
  labels:
    # Istio가 이 네임스페이스의 Pod에 자동으로 사이드카를 주입하도록 설정
    # 사이드카 = Pod 옆에 붙어서 트래픽을 관리하는 Istio 컨테이너
    istio-injection: enabled
