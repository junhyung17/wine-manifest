# ============================================================
# 파일: argocd-app.yaml
# 역할: ArgoCD가 wine-manifest 리포지토리를 감시하고
#       변경사항을 K8S 클러스터에 자동으로 반영하는 설정
# 사용법: kubectl apply -f argocd-app.yaml (1회만 실행)
# 이후: GitHub에 push하면 ArgoCD가 자동으로 배포
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wine-note-app        # ArgoCD 앱 이름 (ArgoCD UI에서 보이는 이름)
  namespace: argocd          # ArgoCD가 설치된 네임스페이스
spec:
  project: default           # ArgoCD 프로젝트 (기본값 사용)

  source:
    # GitHub의 wine-manifest 리포지토리를 감시
    repoURL: https://github.com/junhyung17/wine-manifest.git
    targetRevision: HEAD     # 항상 최신 커밋을 따라감
    path: .                  # 리포 루트 디렉토리부터 적용

    directory:
      recurse: true          # 하위 디렉토리(namespace/, postgresql/ 등)도 재귀적으로 적용

  destination:
    server: https://kubernetes.default.svc   # 현재 클러스터에 배포
    namespace: wine                           # wine 네임스페이스에 배포

  syncPolicy:
    automated:
      prune: true      # GitHub에서 파일 삭제 시 K8S에서도 자동 삭제
      selfHeal: true   # 누군가 kubectl로 직접 수정해도 GitHub 상태로 자동 복구
    syncOptions:
      - CreateNamespace=true  # wine 네임스페이스가 없으면 자동 생성
